name: Update Adblock Rulesets

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout codebase
        uses: actions/checkout@v4

      - name: Install sing-box
        run: |
          VERSION=$(curl -s "https://api.github.com/repos/SagerNet/sing-box/releases/latest" | jq -r .tag_name)
          echo "Installing sing-box $VERSION"
          curl -sLo sing-box.tar.gz "https://github.com/SagerNet/sing-box/releases/download/${VERSION}/sing-box-${VERSION#v}-linux-amd64.tar.gz"
          tar -xzf sing-box.tar.gz
          sudo mv sing-box-*/sing-box /usr/local/bin/
          sing-box version

      - name: Download, Process and Compile Rules
        run: |
          # ==========================================
          # ⬇️ 在此填入您的列表链接 ⬇️
          # ==========================================
          
          # 1. DNS 广告列表 (AdGuard 语法格式)
          DNS_URLS=(
            "https://raw.githubusercontent.com/217heidai/adblockfilters/main/rules/adblockdnslite.txt"
          )
          
          # 2. 域名广告列表 (纯域名文本格式)
          DOMAIN_URLS=(
            "https://raw.githubusercontent.com/TG-Twilight/AWAvenue-Ads-Rule/refs/heads/main/AWAvenue-Ads-Rule.txt"
          )
          
          # 创建准备发布的文件夹，新增 dist-json
          mkdir -p dist-text dist-srs dist-json
          
          RAW_DNS="raw_dns_temp.txt"
          RAW_DOMAIN="raw_domain_temp.txt"
          > "$RAW_DNS"
          > "$RAW_DOMAIN"
          
          # --- 1. 下载列表 ---
          echo "🔄 下载 DNS 列表 (AdGuard 格式)..."
          for url in "${DNS_URLS[@]}"; do
            curl -sSL "$url" >> "$RAW_DNS"
            echo "" >> "$RAW_DNS"
          done
          
          echo "🔄 下载域名列表 (纯文本格式)..."
          for url in "${DOMAIN_URLS[@]}"; do
            curl -sSL "$url" >> "$RAW_DOMAIN"
            echo "" >> "$RAW_DOMAIN"
          done

          # --- 2. 处理 DNS 规则 (直接 Convert) ---
          echo "🧹 去重并生成 DNS 规则..."
          grep -v '^$' "$RAW_DNS" | sort -u > dist-text/dns_ad.txt
          
          echo "🔨 使用 convert 转换 DNS 规则为 .srs..."
          sing-box rule-set convert --type adguard --output dist-srs/dns_ad.srs dist-text/dns_ad.txt

          # --- 3. 处理普通域名规则 (JSON 封装后 Compile) ---
          echo "🧹 清理、去重并生成纯域名规则..."
          grep -v '^#' "$RAW_DOMAIN" | grep -v '^$' | awk '{print $1}' | sort -u > dist-text/domain_ad.txt
          
          echo "🔄 封装纯域名规则为 JSON 并保存到 dist-json 目录..."
          jq -R . dist-text/domain_ad.txt | jq -s 'map(select(length > 0))' | jq '{
            "version": 2,
            "rules": [
              {
                "domain_suffix": .
              }
            ]
          }' > dist-json/domain_ad.json
          
          echo "🔨 编译普通域名规则为 .srs..."
          sing-box rule-set compile --output dist-srs/domain_ad.srs dist-json/domain_ad.json
          
          # --- 4. 收尾清理 (不再删除 JSON 文件) ---
          echo "🧹 清理临时文件..."
          rm "$RAW_DNS" "$RAW_DOMAIN"
          
          echo "✅ 所有处理已完成。"

      - name: Get Current Date
        id: info
        run: |
          echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      # 1. 推送 text 分支
      - name: Deploy Raw Text to 'text' branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist-text
          publish_branch: text
          enable_jekyll: false
          commit_message: "Github Action: update raw text lists [${{ steps.info.outputs.DATE }}]"
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'

      # 2. 推送 json 分支 (新增)
      - name: Deploy JSON to 'json' branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist-json
          publish_branch: json
          enable_jekyll: false
          commit_message: "Github Action: update json rulesets [${{ steps.info.outputs.DATE }}]"
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'

      # 3. 推送 rule-set 分支
      - name: Deploy SRS to 'rule-set' branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist-srs
          publish_branch: rule-set
          enable_jekyll: false
          commit_message: "Github Action: update compiled srs rulesets [${{ steps.info.outputs.DATE }}]"
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
