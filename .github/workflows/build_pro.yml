name: Update Adblock Rulesets

on:
  schedule:
    - cron: '0 4 * * *'
  push:
    paths:
      - 'dns-links.txt'
      - 'domain-links.txt'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 必须保留，赋予机器人推送代码的权限

    steps:
      - name: Checkout codebase
        uses: actions/checkout@v4

      - name: Install sing-box
        run: |
          VERSION=$(curl -s "https://api.github.com/repos/SagerNet/sing-box/releases/latest" | jq -r .tag_name)
          echo "Installing sing-box $VERSION"
          curl -sLo sing-box.tar.gz "https://github.com/SagerNet/sing-box/releases/download/${VERSION}/sing-box-${VERSION#v}-linux-amd64.tar.gz"
          tar -xzf sing-box.tar.gz
          sudo mv sing-box-*/sing-box /usr/local/bin/
          sing-box version

      - name: Download, Process and Compile Rules
        run: |
          # 每次运行前确保目录存在
          mkdir -p dist-text dist-srs dist-json
          
          RAW_DNS="raw_dns_temp.txt"
          RAW_DOMAIN="raw_domain_temp.txt"
          > "$RAW_DNS"
          > "$RAW_DOMAIN"
          
          # --- 1. 读取链接并下载 ---
          echo "🔄 下载 DNS 规则..."
          if [ -f "dns-links.txt" ]; then
            while IFS= read -r url || [ -n "$url" ]; do
              if [[ -n "$url" && ! "$url" =~ ^# ]]; then
                url=$(echo "$url" | tr -d '\r')
                echo "  ⬇️ 下载: $url"
                curl -sSL "$url" >> "$RAW_DNS"
                echo "" >> "$RAW_DNS"
              fi
            done < "dns-links.txt"
          fi
          
          echo "🔄 下载域名规则..."
          if [ -f "domain-links.txt" ]; then
            while IFS= read -r url || [ -n "$url" ]; do
              if [[ -n "$url" && ! "$url" =~ ^# ]]; then
                url=$(echo "$url" | tr -d '\r')
                echo "  ⬇️ 下载: $url"
                curl -sSL "$url" >> "$RAW_DOMAIN"
                echo "" >> "$RAW_DOMAIN"
              fi
            done < "domain-links.txt"
          fi

          # --- 2. 外科手术级清洗与去重 ---
          echo "🧹 深度清洗 DNS 规则 (剔除白名单与 IP)..."
          cat "$RAW_DNS" | \
            tr -d '\r' | \
            sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//' | \
            grep -vE '^[!#\[]' | \
            grep -v '^@@' | \
            grep -vE '^(\|\|)?([0-9]{1,3}\.){3}[0-9]{1,3}(\^)?$' | \
            grep -vE '^(\|\|)?([a-fA-F0-9:]+:[a-fA-F0-9:]+)(\^)?$' | \
            sed 's/[[:space:]]*#.*$//' | \
            awk '{print $1}' | \
            grep -v '^$' | \
            sort -u > dist-text/dns_ad.txt
          
          echo "🧹 深度清洗纯域名规则 (剔除白名单与非标准域名)..."
          cat "$RAW_DOMAIN" | \
            tr -d '\r' | \
            sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//' | \
            grep -vE '^[!#\[]' | \
            grep -v '^@@' | \
            sed -E 's/^(0\.0\.0\.0|127\.0\.0\.1|::1)[[:space:]]+//' | \
            sed 's/[[:space:]]*#.*$//' | \
            awk '{print $1}' | \
            grep -E '^([a-zA-Z0-9]([a-zA-Z0-9\-]*[a-zA-Z0-9])?\.)+[a-zA-Z]{2,}$' | \
            sort -u > dist-text/domain_ad.txt

          echo "📊 最终有效规则数量："
          wc -l dist-text/dns_ad.txt dist-text/domain_ad.txt

          # --- 3. 处理 DNS 规则 ---
          if [ -s dist-text/dns_ad.txt ]; then
            echo "🔨 [DNS] 转换为 .srs..."
            sing-box rule-set convert --type adguard --output dist-srs/dns_ad.srs dist-text/dns_ad.txt

            echo "🔄 [DNS] 提取纯域名转换为 JSON..."
            sed 's/^||//g; s/\^$//g' dist-text/dns_ad.txt | grep -v '^$' > temp_dns_pure.txt
            jq -R . temp_dns_pure.txt | jq -s 'map(select(length > 0))' | jq '{
              "version": 2,
              "rules": [{"domain_suffix": .}]
            }' > dist-json/dns_ad.json
          fi
          
          # --- 4. 处理纯域名规则 ---
          if [ -s dist-text/domain_ad.txt ]; then
            echo "🔄 [域名] 封装为 JSON..."
            jq -R . dist-text/domain_ad.txt | jq -s 'map(select(length > 0))' | jq '{
              "version": 2,
              "rules": [{"domain_suffix": .}]
            }' > dist-json/domain_ad.json
            
            echo "🔨 [域名] 编译 JSON 为 .srs..."
            sing-box rule-set compile --output dist-srs/domain_ad.srs dist-json/domain_ad.json
          fi
          
          # --- 5. 清理临时文件 ---
          rm -f "$RAW_DNS" "$RAW_DOMAIN" temp_dns_pure.txt
          echo "✅ 编译流程完成！"

      - name: Get Current Date
        id: info
        run: echo "DATE=$(date +'%Y-%m-%d %H:%M')" >> $GITHUB_OUTPUT

      # --- 6. 原生 Git 提交与推送 ---
      - name: Commit and Push changes
        run: |
          echo "📦 配置 Git 信息..."
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          echo "➕ 添加生成的文件夹到暂存区..."
          git add dist-text/ dist-json/ dist-srs/
          
          echo "🚀 检查是否有文件变动并推送..."
          # 检查是否有更新，防止没有变化时 commit 报错
          if git diff --staged --quiet; then
            echo "无规则变更，跳过推送。"
          else
            git commit -m "Auto-update rulesets [${{ steps.info.outputs.DATE }}]"
            git push
            echo "✅ 成功推送到主分支！"
          fi
