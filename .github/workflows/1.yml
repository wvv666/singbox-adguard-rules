name: Sync Ad Rules

on:
  schedule:
    - cron: '0 2 * * *' # 每天 UTC 时间 2 点（北京时间 10 点）自动运行
  workflow_dispatch: # 允许你在 Actions 页面手动点击运行

jobs:
  update-rule:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 赋予推送到仓库的权限

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Rule Files
        run: |
          # 创建存放文件的文件夹
          mkdir -p Filters
          
          # 下载 AWAvenue 规则 (Sing-box)
          curl -sL https://raw.githubusercontent.com/TG-Twilight/AWAvenue-Ads-Rule/refs/heads/main/Filters/AWAvenue-Ads-Rule-Singbox.json -o Filters/AWAvenue-Ads-Rule-Singbox.json
          
          # 下载 GOODBYEADS 规则
          curl -sL https://raw.githubusercontent.com/8680/GOODBYEADS/master/data/rules/dns.txt -o Filters/GOODBYEADS-dns.txt

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 追踪 Filters 文件夹下的所有变动
          git add Filters/
          
          # 如果文件没有变化，则不提交；如果有变动，则带上当前日期进行提交并推送
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto update ad rules - $(date +'%Y-%m-%d')" && git push)
