name: Sync and Convert SRS

on:
  workflow_dispatch:
  schedule:
    - cron: "0 22 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install sing-box
        run: |
          TAG=$(curl -s "https://api.github.com/repos/SagerNet/sing-box/releases/latest" | jq -r .tag_name)
          VERSION=${TAG#v}
          wget -qO sing-box.tar.gz "https://github.com/SagerNet/sing-box/releases/download/${TAG}/sing-box-${VERSION}-linux-amd64.tar.gz"
          tar -xzf sing-box.tar.gz
          sudo mv sing-box-*/sing-box /usr/local/bin/

      - name: Merge and Deduplicate
        run: |
          # 1. 下载多个源并合并到 raw.txt
          curl -sL "https://raw.githubusercontent.com/8680/GOODBYEADS/master/data/rules/dns.txt" > raw.txt
          # 2. 仅进行物理去重（保留所有原始行，包括注释，但剔除完全重复的行）
          sort -u raw.txt > merged.txt

      - name: Convert
        run: |
          # 将合并后的文本转换为二进制 srs
          sing-box rule-set convert --type adguard --output dns_filter.srs merged.txt

      - name: Push to Repository
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add dns_filter.srs
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update SRS: $(date +'%Y-%m-%d')"
            git push origin main
          fi
