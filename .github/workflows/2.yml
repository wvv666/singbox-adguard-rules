name: Compile Rules in Filters

on:
  push:
    paths:
      - 'Filters/*.json' # 只有当 Filters 文件夹下的 json 变动时才触发
  workflow_dispatch:

jobs:
  compile:
    runs-on: ubuntu-latest
    # 设置权限，允许 Actions 推送代码到仓库
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install sing-box
        run: |
          # 安装最新版 sing-box 编译器
          bash <(curl -L https://raw.githubusercontent.com/SagerNet/sing-box/main/release/install.sh)

      - name: Compile Filters
        run: |
          cd Filters
          for file in *.json; do
            # 获取不带扩展名的文件名
            filename="${file%.json}"
            echo "Compiling $file to ${filename}.srs..."
            # 明确指定输出路径在当前目录下
            sing-box rule-set compile --output "${filename}.srs" "$file"
          done

      - name: Git Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add Filters/*.srs
          # 如果没有文件变动，git commit 会返回 1，使用 || exit 0 防止 workflow 报错中断
          git commit -m "chore: auto-compile srs for Filters" || exit 0
          git push
