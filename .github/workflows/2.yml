name: Compile Rules in Filters

on:
  push:
    paths:
      - 'Filters/*.json'
  workflow_dispatch:

jobs:
  compile:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install sing-box (Stable Method)
        run: |
          # 获取最新版本号并下载官方二进制文件
          TAG=$(curl -s https://api.github.com/repos/SagerNet/sing-box/releases/latest | jq -r .tag_name)
          VERSION=${TAG#v}
          URL="https://github.com/SagerNet/sing-box/releases/download/${TAG}/sing-box-${VERSION}-linux-amd64.tar.gz"
          
          curl -L "$URL" -o sing-box.tar.gz
          tar -xzf sing-box.tar.gz
          # 将可执行文件移动到系统路径
          sudo mv sing-box-*/sing-box /usr/local/bin/
          sing-box version

      - name: Compile Filters
        run: |
          cd Filters
          for file in *.json; do
            filename="${file%.json}"
            echo "Compiling $file..."
            # 使用 --compact 压缩输出可以进一步减小 srs 体积
            sing-box rule-set compile --output "${filename}.srs" "$file"
          done

      - name: Git Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add Filters/*.srs
          git commit -m "chore: auto-compile srs" || exit 0
          git push
