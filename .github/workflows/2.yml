name: Compile Rules in Filters

on:
  push:
    paths:
      - 'Filters/*.json'
      - 'Filters/*.txt' # 添加对 txt 文件变动的监听
  workflow_dispatch:

jobs:
  compile:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install sing-box (Stable Method)
        run: |
          # 获取最新版本号并下载官方二进制文件
          TAG=$(curl -s https://api.github.com/repos/SagerNet/sing-box/releases/latest | jq -r .tag_name)
          VERSION=${TAG#v}
          URL="https://github.com/SagerNet/sing-box/releases/download/${TAG}/sing-box-${VERSION}-linux-amd64.tar.gz"
          
          curl -L "$URL" -o sing-box.tar.gz
          tar -xzf sing-box.tar.gz
          # 将可执行文件移动到系统路径
          sudo mv sing-box-*/sing-box /usr/local/bin/
          sing-box version

      - name: Compile and Convert Filters
        run: |
          cd Filters
          
          # 开启 nullglob，防止某类文件不存在时循环报错
          shopt -s nullglob 
          
          # 1. 编译 JSON 文件
          for file in *.json; do
            filename="${file%.json}"
            echo "Compiling JSON: $file..."
            sing-box rule-set compile --output "${filename}.srs" "$file"
          done
          
          # 2. 转换 TXT 文件 (AdGuard 格式)
          for file in *.txt; do
            filename="${file%.txt}"
            echo "Converting TXT: $file..."
            sing-box rule-set convert --type adguard --output "${filename}.srs" "$file"
          done

      - name: Git Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 提交所有生成的 .srs 文件
          git add Filters/*.srs
          git commit -m "chore: auto-compile and convert srs files" || exit 0
          git push
